name: Node.js CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  # required for all workflows
  security-events: write

  # only required for workflows in private repositories
  actions: read
  contents: write

  checks: write
  
  # For publishing provenance to npm  
  id-token: write
  
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install and configure
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false  # never use caching in release builds

      - name: Install tools
        run: |
          npm i -g npm@10.9.2
          npm i -g npm-check

      - name: Check tool versions
        run: |
          node --version
          npm --version

      - name: Clean install dependencies
        run: npm ci

      - name: License header check
        run: npm run license-check check

      - name: Run ESLint
        run: npm run eslint-junit || true # Always succeed, even with linting errors

      - name: Report ESLint results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: ESLint Results
          path: "eslint-junit.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Run ESLint
        run: npm run eslint-sarif || true # Always succeed, even with linting errors

      - name: Upload EsLint scan results to GitHub Security tab
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'eslint_report.sarif'
            
            
      #- name: Archive lint reports
      #  if: ${{ success() }} || ${{ failure() }}
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: MegaLinter reports
      #    path: |
      #      megalinter-reports
      #      mega-linter.log
                      
      - name: Build
        run: npm run build
        
        # Don't link any more - we'll do that from the repo that uses this
        
        
        # publish

#      - name: Setup Publish
#        if: success() && github.ref == 'refs/heads/main'
#        uses: actions/setup-node@v6
#        with:
#          node-version: '22.21.1'
#          registry-url: 'https://registry.npmjs.org'
#          package-manager-cache: false  # never use caching in release builds

      - name: Publish diagnostics
        if: success() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_REGISTRY=$(npm config get registry)
          NODE_VERSION=$(node --version)
          NPM_VERSION=$(npm --version)

          echo "== GitHub context =="
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "ref_type=${GITHUB_REF_TYPE}"
          echo "actor=${GITHUB_ACTOR}"
          echo "triggering_actor=${GITHUB_TRIGGERING_ACTOR:-}"
          echo "repository=${GITHUB_REPOSITORY}"
          echo "repository_owner=${GITHUB_REPOSITORY_OWNER}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF:-}"
          echo "workflow_sha=${GITHUB_WORKFLOW_SHA:-}"
          echo "job=${GITHUB_JOB}"
          echo "run_id=${GITHUB_RUN_ID}"
          echo "run_number=${GITHUB_RUN_NUMBER}"
          echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          echo "sha=${GITHUB_SHA}"
          echo "workspace=${GITHUB_WORKSPACE}"
          echo "event_path=${GITHUB_EVENT_PATH}"

          echo "== Runner context =="
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_environment=${RUNNER_ENVIRONMENT:-}"
          echo "ci=${CI:-}"

          echo "== Package / npm context =="
          echo "package_name=${PACKAGE_NAME}"
          echo "package_version=${PACKAGE_VERSION}"
          echo "npm_registry=${NPM_REGISTRY}"
          echo "node_version=${NODE_VERSION}"
          echo "npm_version=${NPM_VERSION}"
          echo "npm_userconfig=${NPM_CONFIG_USERCONFIG:-}"
          echo "id_token_url_present=$([ -n \"${ACTIONS_ID_TOKEN_REQUEST_URL:-}\" ] && echo yes || echo no)"
          echo "id_token_request_token_present=$([ -n \"${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}\" ] && echo yes || echo no)"
          echo "node_auth_token_present=$([ -n \"${NODE_AUTH_TOKEN:-}\" ] && echo yes || echo no)"
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NODE_AUTH_TOKEN is set for this job. npm trusted publishing with OIDC should not rely on a long-lived token. Remove the repository, organization, or environment secret/variable named NODE_AUTH_TOKEN if you want pure OIDC publishing."
          fi

          echo "== Event payload highlights =="
          node <<'EOF'
          const fs = require('fs');
          const path = process.env.GITHUB_EVENT_PATH;
          if (!path || !fs.existsSync(path)) {
            console.log('event_payload_present=no');
            process.exit(0);
          }
          const event = JSON.parse(fs.readFileSync(path, 'utf8'));
          const summary = {
            event_action: event.action || null,
            sender_login: event.sender?.login || null,
            repository_full_name: event.repository?.full_name || null,
            head_commit_id: event.head_commit?.id || null,
            head_commit_url: event.head_commit?.url || null,
            pull_request_number: event.pull_request?.number || null,
            pull_request_head_ref: event.pull_request?.head?.ref || null,
            pull_request_base_ref: event.pull_request?.base?.ref || null,
            pull_request_html_url: event.pull_request?.html_url || null,
          };
          for (const [key, value] of Object.entries(summary)) {
            console.log(`${key}=${value ?? ''}`);
          }
          EOF

          echo "== Redacted npm user config =="
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "${NPM_CONFIG_USERCONFIG}" ]; then
            sed -E \
              -e 's#(//registry\.npmjs\.org/:_authToken=).*#\1***REDACTED***#' \
              -e 's#(_authToken=).*#\1***REDACTED***#' \
              -e 's#(authToken":").*(")#\1***REDACTED***\2#' \
              "${NPM_CONFIG_USERCONFIG}"
          else
            echo "npm_userconfig_file_present=no"
          fi

          echo "== OIDC token claims for npm audience =="
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] && [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            OIDC_RESPONSE=$(curl -sSf \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
            OIDC_TOKEN=$(node -e "const response = JSON.parse(process.argv[1]); process.stdout.write(response.value || '');" "$OIDC_RESPONSE")
            if [ -n "${OIDC_TOKEN}" ]; then
              node -e "const token = process.argv[1]; const payload = token.split('.')[1]; const claims = JSON.parse(Buffer.from(payload, 'base64url').toString('utf8')); const summary = { iss: claims.iss, aud: claims.aud, sub: claims.sub, repository: claims.repository, repository_owner: claims.repository_owner, ref: claims.ref, sha: claims.sha, job_workflow_ref: claims.job_workflow_ref, runner_environment: claims.runner_environment, environment: claims.environment || '' }; for (const [key, value] of Object.entries(summary)) console.log(key + '=' + (value ?? ''));" "$OIDC_TOKEN"
            else
              echo "oidc_token_present=no"
            fi
          else
            echo "oidc_request_context_present=no"
          fi

          echo "== npm registry probes =="
          npm ping --registry https://registry.npmjs.org || true
          npm view "${PACKAGE_NAME}" version --registry https://registry.npmjs.org || true

      - name: Publish
        if: success() && github.ref == 'refs/heads/main'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /home/runner/work/_temp/.npmrc-publish
        run: |
          unset NODE_AUTH_TOKEN
          cat > "${NPM_CONFIG_USERCONFIG}" <<'EOF'
          registry=https://registry.npmjs.org/
          EOF
          echo "Using publish npm userconfig at ${NPM_CONFIG_USERCONFIG}"
          cat "${NPM_CONFIG_USERCONFIG}"
          npm publish --verbose --provenance --access public


      - name: Send a stream message
        if: (success() || failure()) && github.actor != 'dependabot[bot]'
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "githubactionsbot-bot@maurodatamapper.zulipchat.com"
          organization-url: "https://maurodatamapper.zulipchat.com"
          to: "build/github-actions"
          type: "stream"
          topic: "${{github.repository}}"
          content: "${{ job.status == 'success' && ':check_mark:' || ':cross_mark:' }} ${{github.repository}} : **${{github.ref}}**\nGitHub Actions build result: **${{ job.status }}**\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"    